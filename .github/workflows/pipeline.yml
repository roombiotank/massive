name: CI/CD Docker Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:   # ← bikin tombol Run workflow muncul

jobs:

  ci:
    name: Build & Test Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose
        run: docker compose config

      - name: Build Docker image
        run: docker build -t myapp:latest .

      - name: Save Docker image as tar
        run: docker save myapp:latest -o myapp_latest.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v3
        with:
          name: myapp-image
          path: myapp_latest.tar

      - name: Start containers
        run: docker compose up -d

      - name: Wait for services
        run: sleep 15

      - name: Test project1
        run: curl -f http://localhost/project1

      - name: Test project2
        run: curl -f http://localhost/project2

      - name: Stop containers
        if: always()
        run: docker compose down

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    environment: production  # ← bisa pakai approval

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/your-project
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker system prune -f
